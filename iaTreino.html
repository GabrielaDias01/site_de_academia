<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Esta metated descreve o resumo do conteúdo da página, auxilia na disponibilidade do conteúdo da página para os mecanismos de busca.">
    <meta name="keywords" content="metatags, SEO, acessibilidade, mecanismos de busca, html">
    <meta name="author" content="Gabriela de Almeida Dias">
    <meta name="language" content="pt-br">

    <link rel="stylesheet" href="iaTreino.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <title>Treino com suporte de IA</title>
</head>

<body>

    <!-- CABEÇALHO -->
    <header>
        <section class="section">

            <div class="logo">
                <a href="home.html"><img src="logo.png.png" alt="Logo da academia" width="300px" height="200px"
                        margin-bottom=10px></a>
            </div>

            <nav class="nav">
                <ul>
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="sobre.html">SOBRE</a></li>
                    <li><a href="planos.html">PLANOS</a></li>
                    <li><a href="horarios.html">HORÁRIOS</a></li>
                    <li><a href="contatos.html">CONTATOS</a></li>
                    <li><a href="iaTreino.html">TREINO COM IA</a></li>
                    <li><a href="iaPesquisa.html">IA IMAGEM</a></li>
                </ul>
            </nav>

            <div class="icone">
                <a href="login.html" class="btn-icone">
                    <img src="https://img.icons8.com/?size=100&id=uOoIUTYvxnso&format=png&color=000000" alt="Login">
                </a>
            </div>

        </section>
    </header>


    <!-- CONTEÚDO PRINCIPAL -->
    <main>

        <section class="cabecalho">
            <h1 class="TituloPrincipal">
                MONTE SEU TREINO COM <span>IA</span>
            </h1>
            <p class="TituloSecundario">
                Preencha as informações abaixo
            </p>

            <section class="ia2">

                <!-- BLOCO 1 -->
                <div class="blocos">

                    <div class="campo">
                        <label for="altura">
                            <h2>Altura</h2>
                        </label>
                        <input type="text" id="altura" maxlength="4" placeholder="0,00">
                    </div>

                    <div class="campo">
                        <label for="peso">
                            <h2>Peso</h2>
                        </label>
                        <input type="text" placeholder="00,0" maxlength="8" id="peso">
                    </div>

                    <div class="campo">
                        <label for="idade">
                            <h2>Idade</h2>
                        </label>
                        <input type="text" maxlength="3" placeholder="Idade" id="idade">
                    </div>

                    <div class="campo">
                        <label for="sexo">
                            <h2>Sexo</h2>
                        </label>
                        <select id="sexo">
                            <option>Masculino</option>
                            <option>Feminino</option>
                        </select>
                    </div>

                </div>

                <!-- BLOCO 2 -->
                <div class="blocos">

                    <div class="campo">
                        <label for="meta">
                            <h2>Meta</h2>
                        </label>
                        <select id="meta">
                            <option>Emagrecimento</option>
                            <option>Hipertrofia (ganho de massa)</option>
                            <option>Definição</option>
                            <option>Condicionamento físico</option>
                            <option>Reabilitação</option>
                        </select>
                    </div>

                    <div class="campo">
                        <label for="foco">
                            <h2>Foco</h2>
                        </label>
                        <select id="foco">
                            <option>Corpo inteiro</option>
                            <option>Pernas</option>
                            <option>Glúteos</option>
                            <option>Braços</option>
                            <option>Abdômen</option>
                            <option>Costas</option>
                        </select>
                    </div>

                    <div class="campo">
                        <label for="metaTempo">
                            <h2>Meta de tempo</h2>
                        </label>
                        <select id="metaTempo">
                            <option>1 mês</option>
                            <option>3 meses</option>
                            <option>6 meses</option>
                            <option>1 ano</option>
                        </select>
                    </div>

                    <div class="campo">
                        <label for="nivel">
                            <h2>Nível</h2>
                        </label>
                        <select id="nivel">
                            <option>Iniciante</option>
                            <option>Intermediário</option>
                            <option>Avançado</option>
                        </select>
                    </div>

                </div>

                <!-- BLOCO 3 -->
                <div class="blocos">

                    <div class="campo">
                        <label for="disponibilidade">
                            <h2>Disponibilidade</h2>
                        </label>
                        <select id="disponibilidade">
                            <option>1 dia</option>
                            <option>2 dias</option>
                            <option>3 dias</option>
                            <option>4 dias</option>
                            <option>5 dias</option>
                            <option>6 dias</option>
                        </select>
                    </div>

                    <div class="campo">
                        <label for="tempo">
                            <h2>Tempo</h2>
                        </label>
                        <select id="tempo">
                            <option>30 minutos</option>
                            <option>45 minutos</option>
                            <option>1 hora</option>
                            <option>1h30</option>
                            <option>2 horas</option>
                        </select>
                    </div>

                    <div class="campo">
                        <label for="local">
                            <h2>Local</h2>
                        </label>
                        <select id="local">
                            <option>Academia</option>
                            <option>Casa</option>
                            <option>Academia e casa</option>
                        </select>
                    </div>

                    <div class="campo">
                        <label for="lesao">
                            <h2>Lesão</h2>
                        </label>
                        <select id="lesao">
                            <option>Não</option>
                            <option>Joelho</option>
                            <option>Coluna</option>
                            <option>Ombro</option>
                            <option>Outra</option>
                        </select>
                    </div>

                </div>

                <!-- BLOCO 4 -->
                <div class="blocos">

                    <div class="campo">
                        <label for="nivelDor">
                            <h2>Nível de dor</h2>
                        </label>
                        <select id="nivelDor">
                            <option>Nenhuma</option>
                            <option>Leve</option>
                            <option>Moderada</option>
                            <option>Forte</option>
                        </select>
                    </div>

                    <div class="campo">
                        <label for="descreva">
                            <h2>Descreva</h2>
                        </label>
                        <input placeholder="Ex: hipertensão, diabetes..." id="descreva">
                    </div>

                    <div class="campo">
                        <label for="extra">
                            <h2>Extra</h2>
                        </label>
                        <input placeholder="Alguma informação extra" id="extra">
                    </div>

                </div>



                <!-- BOTÃO -->
                <button type="button" class="botaoGerarTreino" id="botaoGerarTreino">
                    Montar Treino ⚡
                </button>

                <!-- RESULTADO -->
                <section class="ResultadoTreino">
                    <div>

                        <div class="blocoCodigoIa">
                            <!-- mensagens da IA vão aparecer aqui -->
                        </div>

                        <div class="input-area">
                            <input placeholder="Digite suas dúvidas aqui" class="inputIa" type="text" id="inputIa">

                            <button type="button" class="botaoEnter" id="botaoEnter">
                                ➤
                            </button>
                        </div>

                    </div>
                </section>

            </section>

    </main>

    <!-- RODAPÉ -->
    <footer>
        <p>© 2026 Academia com Suporte de IA</p>
    </footer>

    <script src="config.js"></script>
    <script src="academiaIA.js"></script>

</body>

</html>
